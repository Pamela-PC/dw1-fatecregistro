<!-- Estrutura Básica HTML -->
<!DOCTYPE html>
<!-- Diz ao navegador a ultima versão do HTML -->
<html lang="pt-br">
  <!-- Atributo Lang informa o idioma do site -->
  <!-- No head iram as metatags(metadados- informações do site) -->
  <head>
    <!-- charset indica o conjunto de caracteres -->
    <meta charset="UTF-8" />
    <!-- Permite apresentar uma melhor vizualização em dispositivos moveis -->
    <meta name="viewport" content="width=device-width" , initial-sacale="1.0" />
    <!-- Titulo exibido na barra do navegador -->
    <title>Meu Website</title>
  </head>
  <!-- Conteúdo do site - O que o usuário irá vizualizar-->
  <body>
    <h1>Meu Site</h1>
    <p>Bem-Vindo ao meu site!</p>
  </body>
</ html>
