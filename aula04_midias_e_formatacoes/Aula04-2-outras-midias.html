<head>

    <title>Outras mídias no HTML5</title>
</head>
<body>
    <header>
        <h1>Outras mídias no HTML5</h1>

    <main>
        <section>

            <h2>Video</h2>
             <video controls src="midias/video.mp4"type="video/mp4"width="400">
                vídeo não encontrado ou não suportado.
             </video>

            <h2>Vídeo do Youtube(externo) - iframe</h2>

            src="https://" 
            title="Exemplo de video do youtube"
            width="560px"
            height="315px"
            frameborder="0">
        </iframe>


        </section>
    </main>
    
</body>
</html>
