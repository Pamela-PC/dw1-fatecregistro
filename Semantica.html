<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <title>Exemplo de site com HTML5 Semântico</title>
</head>
<body>
    <!-- Cabeçalho do site -->
     <header>
        <h1>Portal de Notícias</h1>
     </header>

     <!-- Menu de navegação -->
      <nav>
        <ul>
            <a href="#"> <p>Home</p></a>
            <a href="#"> <p>Tecnologia</p></a>
            <a href="#"> <p>Esporte</p></a>
            <a href="#"> <p>Fazer Login</p></a>
        </ul>
      </nav>
       
    <!-- Linha divisória -->
     <hr>  
    <!-- Parte principal do site -->
<main>
    <!-- Criar uma seção no site -->
     <section>
        <h2>Ultimas Notícias</h2>
        <article>
            <h3>HTML5 ganha destaque</h3>
            <p>O HTML5 trouxe melhorias significativas para a web.</p>
        </article>
        <article>
            <h3>CSS e JavaScript</h3>
            <p>Tecnologias que trabalham em conjunto com o HTML</p>
        </article>
     </section>
    <hr>

    <!-- Conteúdo secundário do site -->
    <aside>
        <h3>Anúncios</h3>
        <!-- Strong deixa o texto em negrito -->
         <p><strong>Espaço Publicitário</strong></p>
    </aside>
</main>
<!-- Rodapé do site -->
<footer><em>&copy; 2026 - Portal de Notícias</em></footer>  
</body>
</html>
